# Mirror a multi-arch upstream image (incl. s390x) into ghcr.io/<owner> verbatim.
#
# Some rke2 core images (e.g. mirrored-pause) already carry an s390x leg upstream on docker.io but are
# absent under our org. When the s390x rke2 binary bakes REGISTRY=ghcr.io/<owner>, those refs must
# resolve there. A local `imagetools create` push fails (PAT lacks write:packages); GITHUB_TOKEN here
# has packages:write, so the copy runs in CI. `imagetools create` copies the digest-pinned manifest
# (all legs) without re-tagging contents — published per-arch digests match upstream.
name: Mirror image to GHCR (s390x-bearing)

on:
  workflow_dispatch:
    inputs:
      src:
        description: "Fully-qualified source ref (e.g. docker.io/rancher/mirrored-pause:3.6)"
        required: true
        type: string
      dst:
        description: "Destination under ghcr.io/<owner> (e.g. mirrored-pause:3.6)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy manifest (all legs) to GHCR
        env:
          SRC: ${{ inputs.src }}
          DST: ${{ inputs.dst }}
        run: |
          set -euo pipefail
          OWNER='${{ github.repository_owner }}'
          docker buildx imagetools create -t "ghcr.io/${OWNER}/${DST}" "$SRC"
          echo "Mirrored $SRC -> ghcr.io/${OWNER}/${DST}"
          docker buildx imagetools inspect --raw "ghcr.io/${OWNER}/${DST}" \
            | jq -r '.manifests[]?.platform | "\(.os)/\(.architecture)"' | grep -v unknown | sort -u
