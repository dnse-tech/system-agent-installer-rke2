# Combine/copy one or more source manifests into ghcr.io/<owner>/<dst>.
# Single src = verbatim mirror (e.g. mirrored-pause). Multiple srcs = merge legs (e.g. our s390x leg +
# upstream amd64/arm64) — used to publish images under the name/tag the rke2 binary's baked
# ghcr.io/<owner> registry expects when our build used a different name/tag. GITHUB_TOKEN has
# packages:write (a local PAT does not).
name: Mirror image to GHCR (s390x-bearing)

on:
  workflow_dispatch:
    inputs:
      srcs:
        description: "Space-separated source refs to merge (s390x leg first, then upstream multi-arch)"
        required: true
        type: string
      dst:
        description: "Destination under ghcr.io/<owner> (e.g. kube-webhook-certgen:v1.14.5-hardened2)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Combine/copy manifest to GHCR
        env:
          SRCS: ${{ inputs.srcs }}
          DST: ${{ inputs.dst }}
        run: |
          set -euo pipefail
          OWNER='${{ github.repository_owner }}'
          docker buildx imagetools create -t "ghcr.io/${OWNER}/${DST}" $SRCS
          echo "Published ghcr.io/${OWNER}/${DST}"
          docker buildx imagetools inspect --raw "ghcr.io/${OWNER}/${DST}" \
            | jq -r '.manifests[]?.platform | "\(.os)/\(.architecture)"' | grep -v unknown | sort -u
